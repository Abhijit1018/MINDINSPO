name: keepalive

# Keeps the Render free-tier service warm (no 30-50s cold start) and runs a
# trivial DB query so Supabase does not auto-pause the project from inactivity.
#
# SETUP (one time):
#   Repo > Settings > Secrets and variables > Actions > Variables > New variable
#     Name:  BACKEND_URL
#     Value: https://<your-render-service>.onrender.com
#   (If BACKEND_URL is unset the job no-ops instead of failing.)
#
# Note: GitHub pauses scheduled workflows after 60 days with no repo activity.
# Any push (or manually running this workflow) resets that timer.

on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 minutes
  workflow_dispatch:          # allow manual "Run workflow"

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend keepalive
        env:
          BACKEND_URL: ${{ vars.BACKEND_URL }}
        run: |
          if [ -z "$BACKEND_URL" ]; then
            echo "BACKEND_URL variable not set — skipping. Add it in repo Settings > Variables."
            exit 0
          fi
          echo "Pinging $BACKEND_URL/api/keepalive"
          # Retry a few times: the very first hit after spin-down can take ~50s.
          for i in 1 2 3 4 5; do
            code=$(curl -sS -m 90 -o /tmp/body -w '%{http_code}' "$BACKEND_URL/api/keepalive" || echo 000)
            echo "attempt $i -> HTTP $code"
            cat /tmp/body || true
            echo
            if [ "$code" = "200" ]; then exit 0; fi
            sleep 15
          done
          echo "keepalive did not return 200 after retries"
          exit 1
